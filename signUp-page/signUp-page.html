<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./signUp-page__pictures/book.svg" type="image/x-icon">
    <link rel="stylesheet" href="./signUp-page__styles/signUp-page-style.css">
    <link rel="stylesheet" href="./signUp-page__styles/signUp-page-responsive.css">
    <title>ثبت نام</title>
</head>
<body>
    <header class="header">

        <div class="header__container">

            <a href="../index.html">

            </a>
            <a href="../index.html">
                <p class="header__title">LibSeat</p>
            </a>

            <div class="header__title-in-mobile">

                <a href="../login-page/login.html" class="header__img__title_container">
                    <img src="./signUp-page__pictures/arrow-left.png" alt="" class="header__img-mobile">

                <p class="header__title-mobile">انتخاب نوع حساب کاربری</p>

                                stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>

                                <line x1="21" y1="12" x2="23" y2="12"></line>

                            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>

            </div>
            
             
        </div>

    <div class="main">

        <div class="main__choase-who">
            <div class="choase-who_title">
                <div class="choase__who__title_container">
                    <p class="main__title_h1">به</p>
                    <p class="main__title_h1" id="main__title_h1--main">LibSeat</p>
                    <p class="main__title_h1">خوش آمدید</p>
                </div>

                <p class="choase__who__title_text">لطفا نوع حساب کاربری خود را امتحان کنید</p>
                
            </div>
            <div class="student-and-admin">

                <a href="../signUp-page-admin/signUp-page-admin.html" class="admin">
                    <div class="admin_container">
                        <img src="./signUp-page__pictures/libseat-admin-icon-v2 1.png" alt="" class="admin_img">
                        <h2 class="admin_title">مدیریت(ادمین)</h2>
                        <p class="admin_text">برای دسترسی به پنل مدیریت و امکانات ویژه</p>
                    </div>
                </a>
    
                <a href="../signUp-page-student/signUp-page-student.html" class="student">

                    <div class="student_conteaneer">
                        <img src="./signUp-page__pictures/libseat-student-icon 1.png" alt="" class="student_img">

    <footer class="footer">

        <section class="footer__section1">
            <p class="footer__section1__title">سیستم رزرو صندلی</p>
            <h2 class="footer__section1__text">کتابخانه دانشگاه شهید باهنر کرمان</h2>

        <section class="footer__section2">
