<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغییر رمز موفقیت آمیز</title>
    <link rel="icon" type="image/png" href="./icons/logo.png">
    <link rel="stylesheet" href="./Styls/reset.css">
    <link rel="stylesheet" href="./Styls/fonts.css">
    <link rel="stylesheet" href="./Styls/pass-reset-success.css">
    <script src="./scripts/success-reset.js" defer></script>
</head>

<body>
    <div class="success-container">
        <header class="header">
            <!-- top bar -->
            <div class="top-bar">
                <div class="brand">
                    <a href="../index.html" class="brand__name">LibSeat</a>
                    <a href="../index.html" class="brand__logo-link">
                        <img src="./icons/logo.svg" alt="LibSeat" class="brand__logo">
                    </a>
                </div>
                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox">
                        <div class="slider">
                            <span class="ball">
                                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="5"></circle>
                                    <line x1="12" y1="1" x2="12" y2="3"></line>
                                    <line x1="12" y1="21" x2="12" y2="23"></line>
                                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                    <line x1="1" y1="12" x2="3" y2="12"></line>
                                    <line x1="21" y1="12" x2="23" y2="12"></line>
                                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                                </svg>
                                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                                </svg>
                            </span>
                        </div>
                    </label>
                </div>
            </div>
        </header>


        <main class="main">
            <div class="success-card">
                <div class="success-checkmark">
                    <div class="success-icon">
                        <div class="success-icon-circle">
                            <div class="success-icon-check"></div>
                        </div>
                    </div>

                </div>

                <h1 class="success-title">رمز عبور با موفقیت تغییر یافت</h1>
                <p class="success-description">
                    رمز عبور شما با موفقیت تغییر یافت. اکنون می‌توانید با رمز عبور جدید خود وارد حساب کاربری شوید.
                </p>

                <a href="../login-page/login.html" class="btn btn--primary success-btn" id="loginBtn">
                    ورود به حساب کاربری
                </a>

            </div>
        </main>
    </div>


</body>

</html>
